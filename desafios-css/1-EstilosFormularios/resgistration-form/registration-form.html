<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Challenge: Create a registration form with the following fields: Name, Email, Password, Confirm Password, and a Submit button. Style the form using CSS to make it visually appealing and user-friendly.">
    <meta name="keywords" content="HTML, CSS, registration form, form styling, web development, user interface">
    <meta name="author" content="Juan Decia">

    <!-- CSS Link -->
    <link rel="stylesheet" href="styles.css">

    <title>Registration Form</title>
</head>
<body>
    <main>
        <header>
            <h1>Registration Form</h1>

            <p>Please fill out the form below to create an account.</p>
        </header>
        <section>
            <form action="">
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>

                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required>

                <hr />

                <label for="picture">Upload a picture: </label>
                <input type="file" id="picture" name="picture" accept="image/*">

                <label for="age">Age: </label>
                <input type="number" id="age" name="age" min="0">

                <label for="about-us">How did you hear about us? </label>
                <select name="about-us" id="about-us">
                    <option value="">Select an option</option>
                    <option value="social-media">Social Media</option>
                    <option value="friend">Friend</option>
                    <option value="advertisement">Advertisement</option>
                    <option value="other">Other</option>
                </select>

                <label for="bio">Tell us about yourself: </label>
                <textarea id="bio" name="bio" rows="4" placeholder="Tell us about yourself..."></textarea>

                <div class="checkbox-container">
                    <label for="terms">I agree to the terms and conditions: </label>
                    <input type="checkbox" id="terms" name="terms" required>
                </div>
                
                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
</body>
</html>
