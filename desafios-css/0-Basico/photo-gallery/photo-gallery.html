<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Challenge: Create a photo gallery using CSS.">
    <meta name="keywords" content="CSS, photo gallery, web design, responsive design">
    <meta name="author" content="Juan Decia">

    <link rel="stylesheet" href="styles.css">

    <title>Photo Gallery</title>
</head>
<body>
    <main>
        <header>
            <h1>Photo Gallery</h1>
        </header>
        <section>
            <article>
                <img 
                    src="https://images.unsplash.com/photo-1543852786-1cf6624b9987?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Z2F0b3N8ZW58MHx8MHx8fDA%3D" 
                    alt="A cat sitting on a windowsill, looking outside. The cat has a fluffy coat and is surrounded by potted plants. The sunlight is streaming through the window, creating a warm and cozy atmosphere."
                    title="Cat-Photo-1"
                />
                <img 
                    src="https://images.unsplash.com/photo-1517331156700-3c241d2b4d83?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8Z2F0b3N8ZW58MHx8MHx8fDA%3D" 
                    alt="A cat lounging on a cozy blanket, surrounded by soft pillows. The cat has a relaxed expression and is basking in the warm sunlight that filters through the window. The scene exudes comfort and tranquility."
                    title="Cat-Photo-2"
                />
            </article>
            <article>
                <img 
                    src="https://images.unsplash.com/photo-1592194996308-7b43878e84a6?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8M3x8Z2F0b3N8ZW58MHx8MHx8fDA%3D" 
                    alt="A cat playing with a toy mouse, surrounded by other toys. The cat has a mischievous expression and is engaged in play. The scene is vibrant and energetic."
                    title="Cat-Photo-3"
                />
                <img 
                    src="https://images.unsplash.com/photo-1518791841217-8f162f1e1131?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NHx8Z2F0b3N8ZW58MHx8MHx8fDA%3D" 
                    alt="A cat resting on a sunny windowsill, with a peaceful expression. The cat is surrounded by green plants and the warm sunlight creates a serene atmosphere."
                    title="Cat-Photo-4"
                />
            </article>
            <article class="last-img">
                <img 
                    src="https://images.unsplash.com/photo-1548802673-380ab8ebc7b7?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8Z2F0b3N8ZW58MHx8MHx8fDA%3D" 
                    alt="A cat sleeping peacefully on a soft blanket, surrounded by pillows. The cat has a serene expression and is nestled in a cozy environment."
                    title="Cat-Photo-5"
                />
            </article>
        </section>
    </main>
    <footer>
    <p>&copy; 2024 Photo Gallery. All rights reserved.</p>
    </footer>
</body>
</html>
